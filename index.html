<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>May the 4th 2026 | Newson Sportec</title>

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(157, 224, 0, 0.10), transparent 30%),
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.08), transparent 20%),
        #050505;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 3000px;
      margin: 0 auto;
      padding: 40px 20px 70px 20px;
    }

    h1 {
      margin-bottom: 30px;
      line-height: 1.1;
      font-size: 144px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    .neon-title span {
      display: inline-block;
      color: #d9ff63;
      text-shadow:
        0 0 5px #d9ff63,
        0 0 10px #baff00,
        0 0 20px #9de000,
        0 0 40px #9de000,
        0 0 80px #9de000;
      animation: twinkle 2.2s infinite ease-in-out;
    }

    .neon-title span:nth-child(1) { animation-delay: 0s; }
    .neon-title span:nth-child(2) { animation-delay: 0.3s; }
    .neon-title span:nth-child(3) { animation-delay: 0.6s; }
    .neon-title span:nth-child(4) { animation-delay: 0.9s; }
    .neon-title span:nth-child(5) { animation-delay: 1.2s; }
    .neon-title span:nth-child(6) { animation-delay: 1.5s; }

    @keyframes twinkle {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
        text-shadow:
          0 0 5px #d9ff63,
          0 0 10px #baff00,
          0 0 20px #9de000,
          0 0 40px #9de000,
          0 0 80px #9de000;
      }
      25% {
        opacity: 0.88;
        text-shadow:
          0 0 3px #d9ff63,
          0 0 6px #baff00,
          0 0 12px #9de000,
          0 0 24px #9de000;
      }
      50% {
        opacity: 1;
        transform: scale(1.02);
        text-shadow:
          0 0 8px #f2ffb0,
          0 0 16px #d9ff63,
          0 0 30px #baff00,
          0 0 60px #9de000,
          0 0 100px #9de000;
      }
      75% {
        opacity: 0.93;
        text-shadow:
          0 0 4px #d9ff63,
          0 0 8px #baff00,
          0 0 16px #9de000,
          0 0 32px #9de000;
      }
    }

    p {
      font-size: 72px;
      line-height: 1.5;
      color: #dddddd;
      max-width: 2600px;
      margin: 0 auto 40px auto;
    }

    img {
      width: 100%;
      max-width: 2700px;
      border-radius: 16px;
      box-shadow:
        0 0 20px rgba(157, 224, 0, 0.30),
        0 0 50px rgba(157, 224, 0, 0.25);
      margin-top: 20px;
    }

    .button {
      display: inline-block;
      margin-top: 40px;
      padding: 28px 48px;
      background-color: #9de000;
      color: #111111;
      text-decoration: none;
      font-weight: bold;
      font-size: 42px;
      border-radius: 12px;
      box-shadow: 0 0 18px rgba(157, 224, 0, 0.45);
      transition: 0.3s ease;
    }

    .button:hover {
      background-color: #baff00;
      box-shadow: 0 0 28px rgba(186, 255, 0, 0.75);
    }

    @media (max-width: 1200px) {
      h1 {
        font-size: 72px;
      }

      p {
        font-size: 32px;
      }

      .button {
        font-size: 28px;
        padding: 20px 32px;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      p {
        font-size: 24px;
      }

      .button {
        font-size: 22px;
        padding: 16px 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="neon-title">
      <span>May</span>
      <span>The</span>
      <span>4th</span>
      <span>With</span>
      <span>You</span>
    </h1>

    <p>
      Celebrate May 4th with the Newson Sportec mascot! Our futuristic dog mechanic is ready for a space adventure with powerful parts, bold performance, and a glowing green light sword.
    </p>

    <img src="may-the-4th-newson-sportec.png" alt="Newson Sportec May the 4th mascot poster">

    <br>

    <a class="button" href="https://newsonsportec.wixsite.com/wheelparts" target="_blank">
      Visit Newson Sportec
    </a>
  </div>
</body>
</html>
