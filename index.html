<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>May the 4th 2026 | Newson Sportec</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0b1630 0%, #050505 55%, #000000 100%);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 3000px;
      margin: 0 auto;
      padding: 40px 20px 80px 20px;
    }

    h1 {
      color: #baff00;
      font-size: 144px;
      margin-bottom: 30px;
      line-height: 1.1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 4px;
      text-shadow:
        0 0 5px #baff00,
        0 0 10px #baff00,
        0 0 20px #9de000,
        0 0 40px #9de000,
        0 0 60px #9de000,
        0 0 80px #7cff00;
    }

    p {
      font-size: 72px;
      line-height: 1.5;
      color: #f2f2f2;
      max-width: 2600px;
      margin: 0 auto 40px auto;
      text-shadow:
        0 0 4px rgba(255,255,255,0.25),
        0 0 10px rgba(157, 224, 0, 0.15);
    }

    img {
      width: 100%;
      max-width: 2700px;
      border-radius: 16px;
      box-shadow:
        0 0 20px rgba(157, 224, 0, 0.35),
        0 0 45px rgba(157, 224, 0, 0.25);
      margin-top: 20px;
    }

    .button {
      display: inline-block;
      margin-top: 40px;
      padding: 28px 48px;
      background-color: #9de000;
      color: #111111;
      text-decoration: none;
      font-weight: bold;
      font-size: 42px;
      border-radius: 12px;
      box-shadow: 0 0 18px rgba(157, 224, 0, 0.45);
      transition: 0.3s ease;
    }

    .button:hover {
      background-color: #baff00;
      box-shadow:
        0 0 10px rgba(186, 255, 0, 0.6),
        0 0 25px rgba(186, 255, 0, 0.8);
    }

    @media (max-width: 1200px) {
      h1 {
        font-size: 72px;
        letter-spacing: 2px;
      }

      p {
        font-size: 32px;
      }

      .button {
        font-size: 28px;
        padding: 20px 32px;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px 15px 50px 15px;
      }

      h1 {
        font-size: 48px;
        letter-spacing: 1px;
      }

      p {
        font-size: 24px;
      }

      .button {
        font-size: 22px;
        padding: 16px 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>May The 4th With You</h1>

    <p>
      Celebrate May 4th with the Newson Sportec mascot! Our futuristic dog mechanic is ready for a space adventure with powerful parts, bold performance, and a glowing green light sword.
    </p>

    <img src="may-the-4th-newson-sportec.png" alt="Newson Sportec May the 4th mascot poster">

    <br>

    <a class="button" href="https://newsonsportec.wixsite.com/wheelparts" target="_blank">
      Visit Newson Sportec
    </a>
  </div>
</body>
</html>
