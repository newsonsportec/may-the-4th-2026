<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>May the 4th 2026 | Newson Sportec</title>

  <style>
    body {
      margin: 0;
      background-color: #050505;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 3000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    h1 {
      color: #9de000;
      font-size: 144px; /* 36px x 4 */
      margin-bottom: 30px;
      line-height: 1.1;
    }

    p {
      font-size: 72px; /* 18px x 4 */
      line-height: 1.5;
      color: #dddddd;
      max-width: 2600px;
      margin: 0 auto 40px auto;
    }

    img {
      width: 100%;
      max-width: 2700px; /* about 3x bigger than 900px */
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(157, 224, 0, 0.45);
      margin-top: 20px;
    }

    .button {
      display: inline-block;
      margin-top: 40px;
      padding: 28px 48px;
      background-color: #9de000;
      color: #111111;
      text-decoration: none;
      font-weight: bold;
      font-size: 42px;
      border-radius: 12px;
    }

    .button:hover {
      background-color: #baff00;
    }

    @media (max-width: 1200px) {
      h1 {
        font-size: 72px;
      }

      p {
        font-size: 32px;
      }

      .button {
        font-size: 28px;
        padding: 20px 32px;
      }
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      p {
        font-size: 24px;
      }

      .button {
        font-size: 22px;
        padding: 16px 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>May the 4th with you</h1>

    <p>
      Celebrate May 4th with the Newson Sportec mascot! Our futuristic dog mechanic is ready for a space adventure with powerful parts, bold performance, and a glowing green light sword.
    </p>

    <img src="may-the-4th-newson-sportec.png" alt="Newson Sportec May the 4th mascot poster">

    <br>

    <a class="button" href="https://newsonsportec.wixsite.com/wheelparts" target="_blank">
      Visit Newson Sportec
    </a>
  </div>
</body>
</html>
